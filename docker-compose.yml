services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: astro
      POSTGRES_DB: astrostock
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro -d astrostock"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    # env_file omitted — .env is gitignored & machine-local; pass via environment instead.
    environment:
      ASTRO_DEBUG: "true"
      ASTRO_DB_URL: postgresql+psycopg://astro:astro@db:5432/astrostock
      ASTRO_EPHEM_PATH: ./data/swisseph
      ASTRO_YFINANCE_CACHE_DIR: ./data/yfinance_cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  dbdata:
