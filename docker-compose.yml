services:
  db:
    image: timescale/timescaledb:latest-pg16
    environment:
      POSTGRES_USER: astro
      POSTGRES_PASSWORD: astro
      POSTGRES_DB: astrostock
    ports:
      - "5432:5432"
    volumes:
      - dbdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro -d astrostock"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    # env_file omitted — .env is gitignored & machine-local; pass via environment instead.
    environment:
      ASTRO_DEBUG: "true"
      ASTRO_DB_URL: postgresql+psycopg://astro:astro@db:5432/astrostock
      ASTRO_EPHEM_PATH: ./data/swisseph
      ASTRO_YFINANCE_CACHE_DIR: ./data/yfinance_cache
      # P1-6 JWT
      ASTRO_JWT_SECRET: "prod-secret-change-me"
      ASTRO_JWT_EXPIRE_MINUTES: "1440"
      # P2-1 LLM (LongCat)
      ASTRO_LLM_BASE_URL: "https://api.longcat.chat/openai/v1/chat/completions"
      ASTRO_LLM_API_KEY: "ak_2fC5bH7f63pz9Fo2aD5ce3lp57i8j"
      ASTRO_LLM_MODEL: "LongCat-2.0"
      ASTRO_LLM_MAX_TOKENS: "1500"
      # P3-2 scheduler
      ASTRO_SCHEDULER_ENABLED: "true"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "127.0.0.1:5173:5173"
    depends_on:
      - backend

volumes:
  dbdata:
